name: Security Pipeline - SAST, SCA, DAST

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  sast:
    name: SAST - Semgrep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep
        run: |
          pip install semgrep
          semgrep --config p/owasp-top-ten --html --output semgrep-report.html . || true
      - name: Upload SAST report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sast-semgrep-report
          path: semgrep-report.html

  sca:
    name: SCA - Dependency Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm install --ignore-scripts
      - name: Run Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'juice-shop'
          path: '.'
          format: 'HTML'
          args: >
            --enableExperimental
            --nodePackageSkipDevDependencies
            --exclude **/*.zip
            --exclude **/*.jar
            --disableAssembly
      - name: Upload SCA report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sca-dependency-check-report
          path: reports/

  dast:
    name: DAST - OWASP ZAP
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ZAP Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'https://juice-shop.herokuapp.com'
          cmd_options: '-r zap-report.html'
      - name: Upload DAST report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dast-zap-report
          path: zap-report.html
